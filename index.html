<!DOCTYPE html>
<html>
<head>
  <title>For My Love ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
      font-family: 'Dancing Script', cursive;
      overflow: hidden;
    }
    .container {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(5px);
      padding: 20px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(255, 75, 110, 0.3);
      text-align: center;
      z-index: 10;
      border: 2px solid white;
      width: 320px;
    }
    h2 {
      color: #ff4b6e;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    /* THIS IS THE MAGIC PART FOR MOBILE */
    video {
      width: 100%;
      border-radius: 20px;
      border: 4px solid white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    p {
        color: #ff4b6e;
        font-size: 1.1rem;
        margin-top: 10px;
        font-family: sans-serif;
    }
    .heart {
      position: absolute;
      color: rgba(255, 75, 110, 0.4);
      font-size: 20px;
      animation: move 6s linear infinite;
    }
    @keyframes move {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="heart" style="left: 10%; animation-delay: 0s;">❤️</div>
  <div class="heart" style="left: 30%; animation-delay: 2s;">💖</div>
  <div class="heart" style="left: 50%; animation-delay: 4s;">❤️</div>
  <div class="heart" style="left: 70%; animation-delay: 1s;">💗</div>
  <div class="heart" style="left: 90%; animation-delay: 3s;">❤️</div>

  <div class="container">
    <h2>i love you</h2>
    
    <!-- This plays inline, autoplays, and loops! -->
    <video autoplay muted loop playsinline controls>
      <source src="IMG_4005.MP4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <p>Tap to unmute! 🔊</p>
  </div>
</body>
</html>
