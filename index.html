<!DOCTYPE html>
<html>
<head>
  <title>For My Love ❤️</title>
  <!-- This adds a romantic font from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Romantic Pink Gradient */
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
      font-family: 'Dancing Script', cursive;
      overflow: hidden; /* Keeps hearts inside the screen */
    }

    .container {
      background: rgba(255, 255, 255, 0.8); /* Frosted glass look */
      backdrop-filter: blur(5px);
      padding: 30px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(255, 75, 110, 0.3);
      text-align: center;
      z-index: 10;
      border: 2px solid white;
    }

    h2 {
      color: #ff4b6e;
      font-size: 2.8rem;
      margin-bottom: 15px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }

    iframe {
      width: 300px;
      height: 500px;
      border: 5px solid white;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    p {
        color: #ff4b6e;
        font-size: 1.2rem;
        margin-top: 10px;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { opacity: 0.5; }
        50% { opacity: 1; }
        100% { opacity: 0.5; }
    }

    /* --- FLOATING HEARTS ANIMATION --- */
    .heart {
      position: absolute;
      color: rgba(255, 75, 110, 0.4);
      font-size: 20px;
      user-select: none;
      animation: move 6s linear infinite;
      z-index: 1;
    }

    @keyframes move {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>

<body>

  <!-- Floating Hearts Background -->
  <div class="heart" style="left: 10%; animation-delay: 0s;">❤️</div>
  <div class="heart" style="left: 20%; animation-delay: 2s;">💖</div>
  <div class="heart" style="left: 35%; animation-delay: 4s;">❤️</div>
  <div class="heart" style="left: 50%; animation-delay: 1s;">💗</div>
  <div class="heart" style="left: 65%; animation-delay: 3s;">❤️</div>
  <div class="heart" style="left: 80%; animation-delay: 5s;">🌸</div>
  <div class="heart" style="left: 90%; animation-delay: 2s;">❤️</div>

  <div class="container">
    <h2>i love you</h2>
    
    <!-- Updated Link with Autoplay & Mute -->
    <iframe 
        src="https://drive.google.com/file/d/1ggdUUgtMho_JNIPlNgrbsQ3W-a80EGCi/preview?autoplay=1&mute=1" 
        allow="autoplay">
    </iframe>

    <p>Tap video for sound! 🔊</p>
  </div>

</body>
</html>
